<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Automation Idea Board</title>

  <!-- =====================================================
       STYLES — fully inline, zero external dependencies
       ===================================================== -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      background: #f4f5f7;
      color: #172b4d;
      padding: 14px 16px 20px;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 8px;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #0052cc; letter-spacing: -0.2px; }
    .header-sub { font-size: 11px; color: #97a0af; display: none; }
    @media (min-width: 540px) { .header-sub { display: inline; } }

    .header-actions { display: flex; gap: 6px; }

    .btn-secondary {
      font-size: 11px;
      font-family: inherit;
      padding: 4px 11px;
      border: 1px solid #c1c7d0;
      border-radius: 3px;
      background: #fff;
      color: #42526e;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .btn-secondary:hover { background: #ebecf0; border-color: #a5adba; }

    /* --- Form card --- */
    .form-card {
      background: #fff;
      border: 1px solid #dfe1e6;
      border-radius: 5px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: 0 1px 2px rgba(23,43,77,0.04);
    }
    .form-label-row {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #6b778c;
      margin-bottom: 10px;
    }
    .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
    .field-group { display: flex; flex-direction: column; gap: 3px; }
    .field-group.grow { flex: 1; min-width: 180px; }
    .field-group label { font-size: 11px; font-weight: 500; color: #42526e; }
    .field-group input {
      border: 1.5px solid #c1c7d0;
      border-radius: 3px;
      padding: 5px 9px;
      font-size: 12.5px;
      font-family: inherit;
      color: #172b4d;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-group input::placeholder { color: #b3bac5; }
    .field-group input:focus { border-color: #0052cc; box-shadow: 0 0 0 2px rgba(0,82,204,0.14); }
    .field-group input[type="number"] { width: 86px; }

    .btn-submit {
      padding: 6px 16px;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .btn-submit:hover { background: #0065ff; }
    .btn-submit:disabled { background: #7ab3f5; cursor: not-allowed; }

    .form-error { font-size: 11px; color: #de350b; margin-top: 6px; display: none; }

    /* --- Stats bar --- */
    .stats-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
    .stat-chip {
      background: #fff;
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      padding: 4px 10px;
      font-size: 11px;
      color: #6b778c;
    }
    .stat-chip strong { color: #172b4d; font-weight: 600; }

    /* --- List header --- */
    .list-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 7px; }
    .list-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #6b778c; }
    .sort-hint { font-size: 10px; color: #b3bac5; }

    /* --- Task list --- */
    #task-list { display: flex; flex-direction: column; gap: 5px; }

    /* --- Task card --- */
    .task-card {
      background: #fff;
      border: 1px solid #dfe1e6;
      border-radius: 4px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: box-shadow 0.12s, border-color 0.12s;
    }
    .task-card:hover { box-shadow: 0 2px 6px rgba(23,43,77,0.09); border-color: #c1c7d0; }

    /* Vote column */
    .vote-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 9px;
      gap: 1px;
      background: #f8f9fa;
      border-right: 1px solid #f0f1f3;
      min-width: 42px;
    }
    .vote-btn {
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      color: #b3bac5;
      padding: 2px 5px;
      border-radius: 2px;
      font-size: 13px;
      line-height: 1;
      transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .vote-btn:hover { color: #0052cc; background: #deebff; border-color: #b3d4ff; }
    .vote-btn.active-up   { color: #0052cc; background: #deebff; border-color: #b3d4ff; }
    .vote-btn.active-down { color: #de350b; background: #ffebe6; border-color: #ffbdad; }
    .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .vote-score { font-size: 15px; font-weight: 700; color: #6b778c; line-height: 1; min-width: 20px; text-align: center; }
    .vote-score.pos { color: #0052cc; }
    .vote-score.neg { color: #de350b; }

    /* Task body */
    .task-body { flex: 1; display: flex; align-items: center; gap: 8px; padding: 9px 10px; min-width: 0; }
    .rank-num { font-size: 10px; font-weight: 700; color: #c1c7d0; min-width: 16px; flex-shrink: 0; }
    .rank-num.gold { color: #ff991f; }
    .task-desc { flex: 1; font-size: 12.5px; color: #172b4d; line-height: 1.4; word-break: break-word; }

    /* Metric badges */
    .metrics { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid transparent;
      line-height: 1.2;
    }
    .badge .val { font-size: 13px; font-weight: 700; }
    .badge .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3px; opacity: 0.75; }

    .badge-hrs  { background: #e6fcff; border-color: #b3f5ff; color: #008da6; }
    .badge-imp         { background: #e3fcef; border-color: #abf5d1; color: #006644; }
    .badge-imp.mid     { background: #fffae6; border-color: #ffe380; color: #974f0c; }
    .badge-imp.high    { background: #ffebe6; border-color: #ffbdad; color: #ae2a19; }
    .badge-imp.neutral { background: #f4f5f7; border-color: #dfe1e6; color: #6b778c; }

    .btn-del {
      background: none;
      border: none;
      color: #dfe1e6;
      cursor: pointer;
      padding: 4px 5px;
      border-radius: 2px;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s, background 0.1s;
    }
    .btn-del:hover { color: #de350b; background: #ffebe6; }

    /* --- Status / toast --- */
    .status-bar {
      font-size: 11px;
      color: #6b778c;
      padding: 5px 10px;
      border-radius: 3px;
      margin-bottom: 8px;
      display: none;
    }
    .status-bar.loading { display: block; background: #f4f5f7; }
    .status-bar.error   { display: block; background: #ffebe6; color: #de350b; }

    /* --- Empty state --- */
    .empty {
      text-align: center;
      padding: 28px 16px;
      color: #97a0af;
      font-size: 12px;
      background: #fff;
      border: 1.5px dashed #dfe1e6;
      border-radius: 5px;
    }
    .empty .empty-icon { font-size: 22px; margin-bottom: 6px; }
    .empty .empty-head { font-size: 13px; font-weight: 600; color: #6b778c; margin-bottom: 3px; }

    /* --- Legend --- */
    .legend { margin-top: 11px; font-size: 10px; color: #97a0af; display: flex; gap: 10px; flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 3px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-low  { background: #36b37e; }
    .dot-mid  { background: #ff991f; }
    .dot-high { background: #de350b; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
      <h1>⚡ AI Automation Idea Board</h1>
      <span class="header-sub">— Vote for the tasks worth automating most</span>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>

  <!-- SUBMIT FORM -->
  <div class="form-card">
    <div class="form-label-row">Submit a Repetitive Task</div>
    <div class="form-row">
      <div class="field-group grow">
        <label for="inp-desc">Task Description</label>
        <input type="text" id="inp-desc"
          placeholder="e.g. Manually copying Jira tickets into weekly Excel reports"
          maxlength="200" />
      </div>
      <div class="field-group">
        <label for="inp-hours">Hours / Week</label>
        <input type="number" id="inp-hours" placeholder="e.g. 3" min="0.1" max="168" step="0.5" />
      </div>
      <button class="btn-submit" id="btn-add" onclick="submitTask()">+ Add Task</button>
    </div>
    <div class="form-error" id="form-error">Please provide a task description and a valid number of hours.</div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar" id="status-bar"></div>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- LIST -->
  <div class="list-header">
    <span class="list-title">Automation Targets</span>
    <span class="sort-hint">Ranked by score · Impact = Score × Hours/Week · shared across team</span>
  </div>
  <div id="task-list"></div>

  <div class="legend" id="legend" style="display:none;">
    <span><span class="dot dot-low"></span> Impact &lt; 8 — Low</span>
    <span><span class="dot dot-mid"></span> 8–20 — Medium</span>
    <span><span class="dot dot-high"></span> &gt; 20 — High</span>
  </div>


  <!-- =====================================================
       JAVASCRIPT
       ===================================================== -->
  <script>
    // ─── Supabase config ────────────────────────────────────
    const SUPA_URL    = 'https://otltsqgdbyaiswkrosan.supabase.co';
    const SUPA_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90bHRzcWdkYnlhaXN3a3Jvc2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTk4MzYsImV4cCI6MjA5NjA3NTgzNn0.JTRnGbjIEvvC7DCTBXyld8qqUF5wJO8nCz36njBU0Fc';
    const TABLE       = 'automation_tasks';
    const HEADERS     = { 'apikey': SUPA_ANON, 'Authorization': `Bearer ${SUPA_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    // ─── Local vote state ────────────────────────────────────
    // Votes are stored in localStorage per-browser so each user
    // can only cast one vote per task, while the counts themselves
    // live in Supabase and are shared across the whole team.
    const VOTE_KEY    = 'aib_votes_v1';

    function loadVotes()       { try { return JSON.parse(localStorage.getItem(VOTE_KEY) || '{}'); } catch { return {}; } }
    function saveVotes(v)      { localStorage.setItem(VOTE_KEY, JSON.stringify(v)); }
    function myVote(id)        { return loadVotes()[id] || null; }
    function setMyVote(id, d)  { const v = loadVotes(); v[id] = d; saveVotes(v); }
    function clearMyVote(id)   { const v = loadVotes(); delete v[id]; saveVotes(v); }

    // ─── REST helpers ────────────────────────────────────────
    async function sbFetch(path, opts = {}) {
      const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
        ...opts,
        headers: { ...HEADERS, ...(opts.headers || {}) }
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || res.statusText);
      }
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function fetchTasks() {
      return sbFetch(`${TABLE}?select=*&order=created_at.asc`);
    }

    async function insertTask(description, hours) {
      return sbFetch(TABLE, {
        method: 'POST',
        body: JSON.stringify({ description, hours })
      });
    }

    async function incrementVote(id, col, delta) {
      // Use Supabase RPC-style arithmetic update via PATCH + raw SQL expression
      // PostgREST supports arithmetic with ?= syntax via headers
      return sbFetch(`${TABLE}?id=eq.${id}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({ [col]: `${col} + ${delta}` })
      }).catch(() => {
        // Fallback: fetch current value then PATCH with explicit number
        return sbFetch(`${TABLE}?id=eq.${id}&select=${col}`)
          .then(rows => {
            const current = rows?.[0]?.[col] ?? 0;
            const next    = Math.max(0, current + delta);
            return sbFetch(`${TABLE}?id=eq.${id}`, {
              method: 'PATCH',
              headers: { 'Prefer': 'return=representation' },
              body: JSON.stringify({ [col]: next })
            });
          });
      });
    }

    async function deleteTask(id) {
      return sbFetch(`${TABLE}?id=eq.${id}`, { method: 'DELETE' });
    }

    // ─── Computed helpers ────────────────────────────────────
    function netScore(t)  { return (t.upvotes || 0) - (t.downvotes || 0); }
    function impact(t)    { return netScore(t) * (t.hours || 0); }
    function impactClass(s) {
      if (s > 20)  return 'high';
      if (s >= 8)  return 'mid';
      if (s <= 0)  return 'neutral';
      return '';
    }
    function sorted(tasks) {
      return [...tasks].sort((a, b) => {
        const sd = netScore(b) - netScore(a);
        return sd !== 0 ? sd : impact(b) - impact(a);
      });
    }
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ─── UI state ────────────────────────────────────────────
    function setStatus(msg, type = '') {
      const el = document.getElementById('status-bar');
      el.textContent = msg;
      el.className   = 'status-bar' + (type ? ' ' + type : '');
    }
    function clearStatus() {
      const el = document.getElementById('status-bar');
      el.textContent = '';
      el.className   = 'status-bar';
    }

    // ─── Submit ──────────────────────────────────────────────
    async function submitTask() {
      const descEl = document.getElementById('inp-desc');
      const hrsEl  = document.getElementById('inp-hours');
      const errEl  = document.getElementById('form-error');
      const btnEl  = document.getElementById('btn-add');

      const description = descEl.value.trim();
      const hours       = parseFloat(hrsEl.value);

      if (!description || !hrsEl.value.trim() || isNaN(hours) || hours <= 0) {
        errEl.style.display = 'block';
        (description ? hrsEl : descEl).focus();
        return;
      }
      errEl.style.display = 'none';
      btnEl.disabled = true;
      setStatus('Saving…', 'loading');

      try {
        await insertTask(description, hours);
        descEl.value = '';
        hrsEl.value  = '';
        descEl.focus();
        clearStatus();
        await loadAndRender();
      } catch (e) {
        setStatus('Could not save — ' + e.message, 'error');
      } finally {
        btnEl.disabled = false;
      }
    }

    // ─── Vote ────────────────────────────────────────────────
    async function vote(id, dir) {
      const current = myVote(id);
      setVoteBtnsDisabled(id, true);

      try {
        if (current === dir) {
          // Undo
          await incrementVote(id, dir === 'up' ? 'upvotes' : 'downvotes', -1);
          clearMyVote(id);
        } else {
          // Reverse previous if any
          if (current === 'up')   await incrementVote(id, 'upvotes',   -1);
          if (current === 'down') await incrementVote(id, 'downvotes', -1);
          // Apply new
          await incrementVote(id, dir === 'up' ? 'upvotes' : 'downvotes', 1);
          setMyVote(id, dir);
        }
        await loadAndRender();
      } catch (e) {
        setStatus('Vote failed — ' + e.message, 'error');
        setTimeout(clearStatus, 3000);
      }
    }

    function setVoteBtnsDisabled(id, disabled) {
      document.querySelectorAll(`[data-id="${id}"] .vote-btn`).forEach(b => b.disabled = disabled);
    }

    // ─── Delete ──────────────────────────────────────────────
    async function handleDelete(id) {
      try {
        await deleteTask(id);
        clearMyVote(id);
        await loadAndRender();
      } catch (e) {
        setStatus('Delete failed — ' + e.message, 'error');
        setTimeout(clearStatus, 3000);
      }
    }

    // ─── Export ──────────────────────────────────────────────
    async function exportCSV() {
      try {
        const tasks = sorted(await fetchTasks());
        if (!tasks.length) { alert('No tasks to export yet.'); return; }
        const header = 'Rank,Task Description,Hours/Week,Net Score,Impact Score,Upvotes,Downvotes';
        const rows = tasks.map((t, i) => [
          i + 1,
          '"' + t.description.replace(/"/g, '""') + '"',
          t.hours,
          netScore(t),
          impact(t).toFixed(1),
          t.upvotes || 0,
          t.downvotes || 0
        ].join(','));
        const blob = new Blob([[header, ...rows].join('\r\n')], { type: 'text/csv;charset=utf-8;' });
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(blob),
          download: 'automation_ideas_' + new Date().toISOString().slice(0, 10) + '.csv'
        });
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        setStatus('Export failed — ' + e.message, 'error');
        setTimeout(clearStatus, 3000);
      }
    }

    // ─── Render ──────────────────────────────────────────────
    function renderStats(tasks) {
      const bar = document.getElementById('stats-bar');
      if (!tasks.length) { bar.innerHTML = ''; return; }
      const totalHrs = tasks.reduce((s, t) => s + Number(t.hours || 0), 0);
      const top      = sorted(tasks)[0];
      bar.innerHTML =
        `<div class="stat-chip">Ideas: <strong>${tasks.length}</strong></div>` +
        `<div class="stat-chip">Total hours/week at risk: <strong>${Number.isInteger(totalHrs) ? totalHrs : totalHrs.toFixed(1)}h</strong></div>` +
        (top ? `<div class="stat-chip">Top target impact: <strong>${impact(top).toFixed(1)}</strong></div>` : '');
    }

    function renderList(tasks) {
      const listEl  = document.getElementById('task-list');
      const legend  = document.getElementById('legend');
      const ordered = sorted(tasks);

      if (!ordered.length) {
        legend.style.display = 'none';
        listEl.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🗂️</div>
            <div class="empty-head">No automation ideas yet</div>
            <div>Submit the first repetitive task above — the whole team shares this board!</div>
          </div>`;
        return;
      }

      legend.style.display = 'flex';
      listEl.innerHTML = ordered.map((task, idx) => {
        const score  = netScore(task);
        const imp    = impact(task);
        const voted  = myVote(task.id);
        const hrsVal = Number(task.hours);

        return `
          <div class="task-card" data-id="${task.id}">
            <div class="vote-col">
              <button class="vote-btn ${voted === 'up' ? 'active-up' : ''}"
                      onclick="vote('${task.id}','up')" title="Upvote — I face this too">▲</button>
              <span class="vote-score ${score > 0 ? 'pos' : score < 0 ? 'neg' : ''}">${score}</span>
              <button class="vote-btn ${voted === 'down' ? 'active-down' : ''}"
                      onclick="vote('${task.id}','down')" title="Downvote — low priority">▼</button>
            </div>
            <div class="task-body">
              <span class="rank-num ${idx === 0 ? 'gold' : ''}">#${idx + 1}</span>
              <span class="task-desc">${esc(task.description)}</span>
              <div class="metrics">
                <div class="badge badge-hrs" title="Hours spent per week">
                  <span class="val">${Number.isInteger(hrsVal) ? hrsVal : hrsVal.toFixed(1)}h</span>
                  <span class="lbl">/ week</span>
                </div>
                <div class="badge badge-imp ${impactClass(imp)}" title="Impact = Net Score × Hours/Week">
                  <span class="val">${Number.isInteger(imp) ? imp : imp.toFixed(1)}</span>
                  <span class="lbl">impact</span>
                </div>
              </div>
              <button class="btn-del" onclick="handleDelete('${task.id}')" title="Remove">✕</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadAndRender() {
      try {
        const tasks = await fetchTasks();
        renderStats(tasks);
        renderList(tasks);
        clearStatus();
      } catch (e) {
        setStatus('Could not load tasks — ' + e.message, 'error');
      }
    }

    // ─── Keyboard shortcuts ──────────────────────────────────
    ['inp-desc', 'inp-hours'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') submitTask();
      });
    });

    // ─── Boot ────────────────────────────────────────────────
    setStatus('Loading shared board…', 'loading');
    loadAndRender();

    // Auto-refresh every 30 s so team votes appear without manual reload
    setInterval(loadAndRender, 30_000);
  </script>

</body>
</html>
